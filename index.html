<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jah'sRock Cleaning | Professional Cleaning UK</title>

<meta name="description" content="Professional cleaning services in Hertfordshire. Book house, office, and deep cleaning today.">
<meta name="keywords" content="cleaning services UK, house cleaning Hertfordshire, office cleaning">
<meta name="author" content="Jah'sRock Cleaning">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system;background:linear-gradient(#f5f7fa,#e9eef5);}

.header{position:sticky;top:0;display:flex;justify-content:space-between;padding:15px 40px;background:white;}
.nav a{margin:0 10px;text-decoration:none;color:#0A1F44;}

.hero{text-align:center;padding:100px 20px;}
button{padding:12px 20px;border:none;background:#007bff;color:white;border-radius:6px;}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
.gallery img{width:100%;height:150px;object-fit:cover;}

form{max-width:400px;margin:auto;display:flex;flex-direction:column;}
input,select,textarea{margin:8px 0;padding:10px;}

</style>
</head>

<body>

<div class="header">
  <h3>Jah'sRock</h3>
  <div class="nav">
    <a href="#" onclick="openAuth()">Login</a>
    <a href="#booking">Book</a>
  </div>
</div>

<div class="hero">
  <h1>Premium Cleaning Services</h1>
  <button onclick="scrollToBooking()">Book Now</button>
</div>

<section>
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="Corridor2.jpg.png">
    <img src="Kitchen2.jpg.png">
    <img src="Lounge3.jpg.png">
    <img src="Toilet.jpg.png">
  </div>
</section>

<section id="booking">
  <h2>Book Now</h2>

  <form onsubmit="bookService(event)">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>

    <select name="service">
      <option>House Cleaning</option>
      <option>Office Cleaning</option>
    </select>

    <input type="date" name="date" required>
    <input type="time" name="time" required>

    <textarea name="details"></textarea>

    <button type="submit">Book & Pay</button>
  </form>
</section>

<!-- ADMIN -->
<section>
  <h2>Admin Panel</h2>
  <div id="bookings"></div>
</section>

<!-- LOGIN MODAL -->
<div id="authModal" style="display:none;position:fixed;top:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center;">
  <div style="background:white;padding:20px;">
    <h3>Login / Register</h3>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "PASTE_KEY",
  authDomain: "PASTE_DOMAIN",
  projectId: "PASTE_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* AUTH */
function openAuth(){document.getElementById("authModal").style.display="flex";}

function register(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>alert("Registered"));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>alert("Logged in"));
}

/* BOOKING */
function bookService(e){
  e.preventDefault();

  let user = auth.currentUser;
  if(!user){alert("Login first");return;}

  let data = {
    name: e.target.name.value,
    email: user.email,
    service: e.target.service.value,
    date: e.target.date.value,
    time: e.target.time.value
  };

  db.collection("bookings").add(data)
  .then(()=>{
    alert("Booking saved");

    // STRIPE PAYMENT LINK
    window.location.href = "https://buy.stripe.com/test_link_here";
  });
}

/* ADMIN VIEW */
auth.onAuthStateChanged(user=>{
  if(user){
    db.collection("bookings").onSnapshot(snap=>{
      let html="";
      snap.forEach(doc=>{
        let b=doc.data();
        html+=`<p>${b.name} - ${b.date} ${b.time}</p>`;
      });
      document.getElementById("bookings").innerHTML=html;
    });
  }
});

function scrollToBooking(){
  document.getElementById("booking").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
