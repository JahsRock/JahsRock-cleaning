<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jah'sRock Ltd</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,sans-serif;
  background:linear-gradient(#f5f7fa,#e9eef5);
  color:#0A1F44;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo{
  display:flex;
  align-items:center;
}
.logo img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  margin-right:10px;
}

.contact-btn{
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#0A1F44,#007bff);
  color:white;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px 30px;
}

.hero h1{font-size:40px;}

.hero button{
  margin:8px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#0A1F44,#007bff);
  color:white;
  cursor:pointer;
}

/* SECTION */
section{
  padding:40px 20px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
}

/* BOOKING */
.booking-container{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
  max-width:1200px;
  margin:auto;
}

form{
  display:flex;
  flex-direction:column;
}

input,select,textarea{
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button.submit{
  background:#0A1F44;
  color:white;
  padding:12px;
  border:none;
}

/* MODALS */
#contactModal,#priceModal,#subModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:350px;
  text-align:center;
}

.result{
  margin-top:10px;
  font-size:22px;
  font-weight:bold;
}

.note{
  font-size:12px;
  color:#666;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="Logo.jpeg">
    <h3>Jah'sRock Ltd</h3>
  </div>
  <button onclick="openContact()" class="contact-btn">Contact</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Premium Cleaning Services</h1>
  <button onclick="scrollToBooking()">Book Now</button>
  <button onclick="openPrice()">Get Estimate</button>
  <button onclick="openSub()">Subscribe & Save</button>
</div>

<!-- SERVICES -->
<section>
<h2>Our Services</h2>
<div class="grid">
<div class="card">House Cleaning</div>
<div class="card">End of Tenancy</div>
<div class="card">Commercial Cleaning</div>
<div class="card">Deep Cleaning</div>
</div>
</section>

<!-- BOOKING -->
<section id="booking">
<h2>Book a Cleaning</h2>
<div class="booking-container">

<form action="https://formspree.io/f/xaqlykvq" method="POST">
<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<select name="service">
<option>House Cleaning</option>
<option>Office Cleaning</option>
<option>Deep Cleaning</option>
</select>

<textarea name="details" placeholder="Details"></textarea>

<button class="submit">Book Now</button>
</form>

</div>
</section>

<!-- PRICE MODAL -->
<div id="priceModal">
<div class="modal-box">

<h3>Estimate Cost</h3>

<input type="number" id="rooms" placeholder="Rooms">
<input type="number" id="bathrooms" placeholder="Bathrooms">
<input type="number" id="toilets" placeholder="Toilets">

<select id="size">
<option value="1">Small</option>
<option value="1.2">Medium</option>
<option value="1.5">Large</option>
</select>

<select id="dirt">
<option value="1">Very Clean</option>
<option value="5">Very Dirty</option>
</select>

<button onclick="calculatePrice()">Calculate</button>

<div class="result" id="result"></div>
<div class="note">Estimate only. Final quote may vary.</div>

</div>
</div>

<!-- SUBSCRIPTION MODAL -->
<div id="subModal">
<div class="modal-box">

<h3>Subscribe & Save</h3>

<select id="subscription">
<option value="0">No Subscription</option>
<option value="0.20">Weekly (20% Off)</option>
<option value="0.15">Bi-Weekly (15% Off)</option>
<option value="0.10">Monthly (10% Off)</option>
</select>

<button onclick="saveSubscription()">Apply</button>

</div>
</div>

<!-- CONTACT MODAL -->
<div id="contactModal">
<div class="modal-box">
<h3>Contact</h3>
<p>jahsrockcleaning@gmail.com</p>
<p>078926455527</p>
</div>
</div>

<script>

let subscriptionDiscount = 0;
let subscriptionName = "";

function openContact(){document.getElementById("contactModal").style.display="flex";}
function openPrice(){document.getElementById("priceModal").style.display="flex";}
function openSub(){document.getElementById("subModal").style.display="flex";}

window.onclick=function(e){
if(e.target.id==="contactModal"||e.target.id==="priceModal"||e.target.id==="subModal"){
e.target.style.display="none";
}
}

function saveSubscription(){
let val = document.getElementById("subscription");
subscriptionDiscount = +val.value;
subscriptionName = val.options[val.selectedIndex].text;
document.getElementById("subModal").style.display="none";
alert("Subscription applied: " + subscriptionName);
}

function calculatePrice(){

let rooms = +document.getElementById("rooms").value || 0;
let baths = +document.getElementById("bathrooms").value || 0;
let toilets = +document.getElementById("toilets").value || 0;
let size = +document.getElementById("size").value;
let dirt = +document.getElementById("dirt").value;

let total = 45 + (rooms*13) + (baths*20) + (toilets*12);

let dirtMultiplier = 1 + (dirt-1)*0.25;

total = total * dirtMultiplier * size;

// Apply subscription discount
if(subscriptionDiscount){
total = total * (1 - subscriptionDiscount);
}

total = Math.round(total / 5) * 5;

window.estimatedPrice = total;

document.getElementById("result").innerText = "£" + total;

}

function scrollToBooking(){

document.getElementById("booking").scrollIntoView({behavior:"smooth"});

setTimeout(()=>{
let textarea = document.querySelector("textarea");

if(window.estimatedPrice){
textarea.value =
"Estimated Price: £" + window.estimatedPrice +
"\nSubscription: " + (subscriptionName || "None");
}

},500);

}

</script>

</body>
</html>
