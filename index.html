<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jah'sRock Ltd</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,sans-serif;
  background:linear-gradient(#f5f7fa,#e9eef5);
  color:#0A1F44;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.logo{
  display:flex;
  align-items:center;
}
.logo img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  margin-right:10px;
}

.contact-btn{
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#0A1F44,#007bff);
  color:white;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px 30px;
}

.hero h1{font-size:40px;}
.hero p{
  max-width:650px;
  margin:10px auto;
  color:#555;
}

.hero button{
  margin:8px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#0A1F44,#007bff);
  color:white;
  cursor:pointer;
}

/* ✅ FIXED TRUST (FORCED HORIZONTAL) */
.trust{
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:nowrap; /* prevents vertical stacking */
  overflow-x:auto;  /* allows scroll if needed */
}

.trust div{
  white-space:nowrap;
  background:white;
  padding:8px 14px;
  border-radius:20px;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

/* SECTION */
section{
  padding:40px 20px;
  text-align:center;
}

/* SERVICES */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  text-align:left;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:8px;
  max-width:1000px;
  margin:auto;
}
.gallery img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:8px;
}

/* BOOKING */
.booking-container{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
  max-width:1200px;
  margin:auto;
}

/* ✅ FIXED VIDEO */
.video-box{
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  height:100%;
}

.video-frame{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}

.video-frame iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border-radius:10px;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
}

input,select,textarea{
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button.submit{
  background:#0A1F44;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
}

/* FOOTER */
footer{
  background:#0A1F44;
  color:white;
  text-align:center;
  padding:20px;
}

/* MODALS */
#contactModal,#priceModal,#subModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:20px;
width:360px;
text-align:center;
}

.result{font-size:22px;margin-top:10px;font-weight:bold;}
.note{font-size:12px;color:#666;margin-top:10px;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="Logo.jpeg">
    <div>
      <h3>Jah'sRock Ltd</h3>
      <small style="color:#6b7280;">Professional Cleaning Services</small>
    </div>
  </div>

  <button onclick="openContact()" class="contact-btn">Contact</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Premium Cleaning Services</h1>
  <p>Reliable, professional, and affordable cleaning services delivering expert clean-up solutions.</p>

  <button onclick="scrollToBooking()">Book Now</button>
  <button onclick="openPrice()">Get Estimate</button>
  <button onclick="openSub()">Subscribe & Save</button>

  <div class="trust">
    <div>✔ Fully Insured</div>
    <div>✔ Reliable</div>
    <div>✔ Affordable</div>
    <div>✔ Expert Clean-Up</div>
  </div>
</div>

<!-- REST OF YOUR CODE REMAINS EXACTLY THE SAME -->

<script>
// KEEP YOUR EXISTING JS (unchanged)
</script>

</body>
</html>
